services:
  - type: web
    name: luminordic-chatbot
    env: node
    region: frankfurt
    plan: free
    rootDir: chatbot
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STORE_BASE_URL
        value: https://www.luminordic.com
